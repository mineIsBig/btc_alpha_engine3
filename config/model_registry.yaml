# model_registry.yaml
horizons: [1, 4, 8, 12, 24]

baseline_models:
  logistic_regression:
    enabled: true
    class: "src.models.baseline.LogisticRegressionModel"
    params:
      C: [0.01, 0.1, 1.0, 10.0]
      penalty: ["l1", "l2", "elasticnet"]
      solver: "saga"
      max_iter: 2000

  random_forest:
    enabled: true
    class: "src.models.baseline.RandomForestModel"
    params:
      n_estimators: [100, 200, 500]
      max_depth: [5, 10, 20]
      min_samples_leaf: [10, 20, 50]

  lightgbm:
    enabled: true
    class: "src.models.gradient_boost.LightGBMModel"
    params:
      n_estimators: [100, 300, 500]
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      num_leaves: [15, 31, 63]
      min_child_samples: [20, 50]
      subsample: [0.7, 0.8, 0.9]
      colsample_bytree: [0.7, 0.8, 0.9]
      reg_alpha: [0.0, 0.1, 1.0]
      reg_lambda: [0.0, 0.1, 1.0]

  xgboost:
    enabled: true
    class: "src.models.gradient_boost.XGBoostModel"
    params:
      n_estimators: [100, 300, 500]
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      subsample: [0.7, 0.8, 0.9]
      colsample_bytree: [0.7, 0.8, 0.9]

regime_model:
  enabled: true
  class: "src.models.regime.RegimeGateModel"

sequence_model:
  enabled: false  # v2 feature
  class: "src.models.sequence.SmallLSTMModel"

calibration:
  method: isotonic  # isotonic or sigmoid
  enabled: true

promotion:
  # Base thresholds (will be adjusted by Bonferroni correction)
  min_oos_sharpe: 0.5
  min_oos_accuracy: 0.52
  max_breach_rate: 0.0
  min_folds: 3
  
  # Multiple comparisons protection
  # With 20 model-horizon combinations, false positives are likely
  # Bonferroni correction increases thresholds based on number of combinations
  bonferroni_correction: true
  n_combinations_tested: 20  # Adjust based on actual search space
  
  # Consecutive fold requirements
  # Models must pass on multiple consecutive windows, not just on average
  min_consecutive_folds: 2  # Require 2+ consecutive passing folds
  
  # Strict per-fold requirements
  # No single fold can have negative Sharpe (prevents one good fold masking bad ones)
  require_positive_sharpe_each_fold: true

evolutionary_search:
  enabled: true
  population_size: 20
  generations: 10
  mutation_rate: 0.2
  crossover_rate: 0.7
  tournament_size: 3
  feature_subset_min: 5
  feature_subset_max: 40
