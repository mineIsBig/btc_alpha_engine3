coinalyze:
  base_url: "https://api.coinalyze.net/v1"
  rate_limit_per_minute: 40
  retry_max: 3
  retry_backoff: 2.0
  endpoints:
    funding_rate_history: "/funding-rate-history"
    oi_history: "/open-interest-history"
    liquidation_history: "/liquidation-history"
    long_short_ratio_history: "/long-short-ratio-history"
    ohlcv_history: "/ohlcv-history"
  default_interval: 1hour

hyperliquid:
  mainnet_url: "https://api.hyperliquid.xyz"
  testnet_url: "https://api.hyperliquid-testnet.xyz"
  info_endpoint: "/info"
  exchange_endpoint: "/exchange"
  ws_url: "wss://api.hyperliquid.xyz/ws"
  ws_testnet_url: "wss://api.hyperliquid-testnet.xyz/ws"

price:
  # Use Coinalyze or Hyperliquid candles as price source
  primary_source: coinalyze
  fallback_source: hyperliquid
  interval: 1h
