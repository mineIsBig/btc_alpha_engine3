# docker-compose.monitoring.yml
# Prometheus + Grafana stack for BTC Alpha Agent monitoring
# Usage: docker-compose -f docker-compose.monitoring.yml up -d

version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: btc_alpha_prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: btc_alpha_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=alpha_engine
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/btc_alpha_dashboard.json:/var/lib/grafana/dashboards/btc_alpha_dashboard.json
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
